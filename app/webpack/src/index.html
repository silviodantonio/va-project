<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
        <title>Road accidents</title>
       <link rel="stylesheet" href="reset_button.css">
    </head>
    <style>
 
</style>


    <body>

        <section id="viz" class="container-fluid h-100 py-1">
            <div class="row g-2">

                <!-- LEFT: charts -->
                <div class="col-6">
                
                    <!-- ROW 1: 3 charts -->
                    <div class="row g-2">
                        <div class="col-6">
                            <div class="viz-area" id="chart-intersection"></div>
                        </div>
                        <div class="col-6">
                            <div class="viz-area" id="chart-accident-type"></div>
                        </div>
                    </div>

                    <!-- ROW 2: PCA  -->
                    <div class="row g-2 mt-1">
                        <div class="col-12">
                            <div class="viz-area d-flex flex-column">
                                <div class="p-3" id="selector-container">
                                    <label style="font-weight: 600; font-size: 18px; color: #333; margin-right: 10px;">PCA</label>
                                    <label for="colorSelector">Colored according to</label>
                                    <select name="attribute" id="colorSelector">
                                        <option value="density">Density</option>
                                        <option value="observation">Observations</option>
                                        <option value="deadly">Deadliness</option>
                                        <option value="accident_type">Accident type</option>
                                        <option value="intersection">Road section</option>
                                    </select>
                                    <span id="selection-percentage" class="ms-4 fw-bold">
                                        <span id="selected-percentage">Percentage: 0.00%</span>
                                        <span id="selected-fraction" class="ms-3">Fraction: 0 / 0</span>
                                    </span>
                                </div>

                                <div id="pca-container"></div>
                            </div>
                        </div>
                    </div>

                </div>
                <div class="col-3">
                            <div class="d-flex flex-column h-100">
                                <div class="viz-area-heatmap" id="heatmap-month-week" style="flex: 4 1 0;"></div>
                                <div class="viz-area-heatmap mt-2" id="heatmap-week-hours" style="flex: 7 1 0;"></div>
                            </div>
                        </div>
                <!-- RIGHT: MAP + HEATMAP -->
                <div class="col-3">
                    <div class="d-flex flex-column h-100">
                        <div class="viz-area-heatmap" id="chart-region" style="flex: 5 1 0;"></div>
                        <div class="viz-area mt-2" id="map-container" style="flex: 6 1 0;"></div>
                    </div>
                </div>

            </div>
        </section>
    </body>
   

</html>
