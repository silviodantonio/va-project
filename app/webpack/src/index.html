<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
        <title>Road accidents</title>
    </head>

    <body>

        <section id="viz" class="container-fluid">
            <div class="row g-2">

                <!-- LEFT: charts -->
                <div class="col-9">
                
                    <!-- ROW 1: 3 charts -->
                    <div class="row g-2">
                        <div class="col-4">
                            <div class="viz-area" id="chart-intersection"></div>
                        </div>
                        <div class="col-4">
                            <div class="viz-area" id="chart-accident-type"></div>
                        </div>
                        <div class="col-4">
                            <div class="viz-area" id="heatmap-week-hours"></div>
                        </div>
                    </div>

                    <!-- ROW 2: PCA + extra -->
                    <div class="row g-2 mt-2">
                        <div class="col-8">
                            <div class="viz-area d-flex flex-column">
                                <div class="p-3" id="selector-container">
                                    <label for="colorSelector">Color according to</label>
                                    <select name="attribute" id="colorSelector">
                                        <option value="density">Density</option>
                                        <option value="deadly">Deadliness</option>
                                        <option value="accident_type">Accident type</option>
                                        <option value="intersection">Road section</option>
                                    </select>
                                </div>
                                <div id="pca-container"></div>
                            </div>
                        </div>
                        <div class="col-4">
                            <div class="viz-area" id="extra-chart"></div>
                        </div>
                    </div>

                </div>
                <!-- RIGHT: MAP + HEATMAP -->
                <div class="col-3">
                    <div class="d-flex flex-column h-100">
                        <div class="viz-area-heatmap" id="heatmap-month-week" style="flex: 1 1 0;"></div>
                        <div class="viz-area mt-3" id="map-container" style="flex: 2 1 0;"></div>
                    </div>
                </div>

            </div>
        </section>
    </body>
</html>
