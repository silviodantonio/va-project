<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
        <title>Road accidents</title>
    </head>
    <style>
 
</style>


    <body>

        <section id="viz" class="container-fluid h-100 py-1">
            <div class="row g-2">

                <!-- LEFT: charts -->
                <div class="col-6">
                
                    <!-- ROW 1: 3 charts -->
                    <div class="row g-2">
                        <div class="col-6">
                            <div class="viz-area" id="chart-intersection"></div>
                        </div>
                        <div class="col-3">
                            <div class="viz-area" id="chart-accident-type"></div>
                        </div>
                        <div class="col-3">
                            <div class="viz-area" id="chart-deadly"></div>
                        </div>
                    </div>

                    <!-- ROW 2: PCA  -->
                    <div class="row g-2 mt-1">
                        <div class="col-12">
                            <div class="viz-area d-flex flex-column">
                                <div class="p-3" id="selector-container">
                                    <label style="font-weight: 600; font-size: 18px; color: #333; margin-right: 10px;">PCA</label>
                                    <label for="colorSelector">Colorato secondo:</label>
                                    <select name="attribute" id="colorSelector">
                                        <option value="density">Densità</option>
                                        <option value="observation">Osservazioni</option>
                                        <option value="deadly">Mortalità</option>
                                        <option value="accident_type">Tipo Incidente</option>
                                        <option value="intersection">Tratto stradale</option>
                                    </select>
                                    <span id="selection-percentage" class="ms-4 fw-bold">
                                        <span id="selected-percentage">Selezionato:  0%</span>
                                        <span id="selected-fraction" class="ms-2">(0 / 173234)</span>
                                    </span>
                                </div>

                                <div id="pca-container">
                                    <input type="range", min="0", max="100", value="100" id="slider">
                                </div>
                            </div>
                        </div>
                        <!-- <div class="col-3">
                            <div class="viz-area" id="boxplot"></div>
                        </div> -->
                    </div>

                </div>
                <div class="col-3">
                            <div class="d-flex flex-column h-100">
                                <div class="viz-area-heatmap" id="heatmap-month-week" style="flex: 4 1 0;"></div>
                                <div class="viz-area-heatmap mt-2" id="heatmap-week-hours" style="flex: 7 1 0;"></div>
                            </div>
                        </div>
                <!-- RIGHT: MAP + HEATMAP -->
                <div class="col-3">
                    <div class="d-flex flex-column h-100">
                        <div class="viz-area-heatmap" id="chart-region" style="flex: 5 1 0;"></div>
                        <div class="viz-area mt-2" id="map-container" style="flex: 6 1 0;"></div>
                    </div>
                </div>

            </div>
        </section>
    </body>
   

</html>
