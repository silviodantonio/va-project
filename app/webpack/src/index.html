<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
        <title>Road accidents</title>
    </head>

    <body>

        <section id="viz" class="container-fluid">
            <div class="row g-2">

                <!-- LEFT: charts -->
                <div class="col-9">
                
                <!-- ROW 1: 3 charts -->
                <div class="row g-2">
                    <div class="col-4">
                    <div class="viz-area" id="chart-intersection"></div>
                    </div>
                    <div class="col-4">
                    <div class="viz-area" id="chart-accident-type"></div>
                    </div>
                    <div class="col-4">
                    <div class="viz-area" id="chart-region"></div>
                    </div>
                </div>

                <!-- ROW 2: PCA + extra -->
                <div class="row g-2 mt-2">
                    <div class="col-8">
                    <div class="viz-area" id="pca-container"></div>
                    </div>
                    <div class="col-4">
                    <div class="viz-area" id="extra-chart"></div>
                    </div>
                </div>

                </div>

                <!-- RIGHT: MAP (full height) -->
                <div class="col-3 d-flex">
                <div class="viz-area flex-fill" id="map-container"></div>
                </div>

            </div>
            </section>
    </body>
</html>
