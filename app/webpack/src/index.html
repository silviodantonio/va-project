<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
        <title>Document</title>
    </head>

    <body>

        <section id="viz">
            <div class="row">
                <!-- Left side: 8 bar charts in 4x2 grid -->
                <div class="col-md-9">
                    <div class="row row-cols-4 g-2">
                         <div class="col">
                            <div class="viz-area" id="chart-week-day"></div>
                        </div>
                        <!--DA VALUTARE SE TENERLA CON UN BAR CHART NON RENDE BENE-->
                        <div class="col">
                            <div class="viz-area" id="chart-intersection"></div>
                        </div>
                        <div class="col">
                            <div class="viz-area" id="chart-accident-type"></div>
                        </div>
                        <div class="col">
                            <div class="viz-area" id="chart-deadly"></div>
                        </div>
                        
                        <!-- Second row of bar charts -->
                        <div class="col-4">
                            <div class="viz-area" id="chart-hour"></div>
                        </div>
                         <div class="col-4">
                            <div class="viz-area" id="chart-region"></div>
                        </div>
                        <div class="col-4">
                            <div class="viz-area" id="chart-month"></div>
                        </div>
                        <!-- Empty cell to align with map -->
                        <div class="col"></div>
                    </div>
                    
                    <!-- PCA container spanning full width below -->
                    <!-- <div class="row mt-4">
                        <div class="col-13">
                            <div class="viz-area" id="pca-container"></div>
                        </div>
                    </div> -->
                </div>
                
                <!-- Right side: Map taking 2 rows height -->
                <div class="col-md-3">
                    <div class="viz-area" id="map-container"></div>
                </div>
                <div class="row mt-4">
                        <div class="col-12">
                            <div class="viz-area" id="pca-container"></div>
                </div>
                </div>
            </div>
        </section>
    </body>
</html>
